<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ──────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />

    <!-- ── Google Fonts ─────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ── Primary SEO ──────────────────────────────────────── -->
    <title>Controva LLC — Engineering-Driven Digital Growth Agency</title>
    <meta name="description" content="Controva LLC builds digital empires that scale. Full-stack engineering, performance marketing, AI automation, Shopify e-commerce — with a 30-Day Profit Guarantee. Elite results, engineered." />
    <meta name="keywords" content="digital marketing agency, web development, AI automation, Shopify, e-commerce, performance marketing, full-stack development, lead generation" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="Controva LLC" />
    <link rel="canonical" href="https://www.controvallc.com/" />

    <!-- ── Open Graph (Facebook, LinkedIn) ──────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.controvallc.com/" />
    <meta property="og:title" content="Controva LLC — Engineering-Driven Digital Growth" />
    <meta property="og:description" content="We build digital empires that scale. Full-stack engineering, AI automation, e-commerce, and performance marketing with a 30-Day Profit Guarantee." />
    <meta property="og:image" content="https://www.controvallc.com/images/og-home.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Controva LLC" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ─────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@controvallc" />
    <meta name="twitter:title" content="Controva LLC — Engineering-Driven Digital Growth" />
    <meta name="twitter:description" content="We build digital empires that scale. Full-stack engineering, AI automation, e-commerce, and performance marketing." />
    <meta name="twitter:image" content="https://www.controvallc.com/images/og-home.jpg" />

    <!-- ── Sitemap & RSS references ─────────────────────────── -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <link rel="alternate" type="application/rss+xml" title="Controva LLC Blog RSS Feed" href="/rss.xml" />


    <!-- ── JSON-LD: WebSite (enables Google Sitelinks Searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Controva LLC",
      "url": "https://www.controvallc.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.controvallc.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
