    <!-- ── JSON-LD: WebSite (enables Google Sitelinks Searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Controva LLC",
      "url": "https://www.controvallc.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.controvallc.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <body>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100svh;
          background-color: #FAFAFB;
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(30, 58, 138, 0.1);
          border-radius: 50%;
          border-top-color: #1E3A8A;
          animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @media (prefers-color-scheme: dark) {
          .initial-loader { background-color: #0D1117; }
          .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #FFFFFF;
          }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
